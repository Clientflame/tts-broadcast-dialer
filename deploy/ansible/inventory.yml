# ============================================================
# Ansible Inventory — TTS Dialer Client Servers
# ============================================================
# Add each client as a host under the 'dialer_clients' group.
# Customize per-client variables as needed.
#
# Usage:
#   ansible-playbook -i inventory.yml playbook-update.yml
#   ansible-playbook -i inventory.yml playbook-update.yml --limit abc_marketing
#   ansible-playbook -i inventory.yml playbook-status.yml
# ============================================================

all:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    deploy_dir: /opt/tts-dialer
    docker_image: "ghcr.io/YOUR_ORG/tts-broadcast-dialer:latest"

  children:
    dialer_clients:
      hosts:
        # --- Example Client: ABC Marketing ---
        abc_marketing:
          ansible_host: 149.28.xxx.xxx
          client_name: "ABC Marketing"
          app_port: 80
          pbx_host: "149.28.xxx.xxx"
          # version_pin: "v1.3.0"  # Uncomment to pin to a specific version

        # --- Example Client: XYZ Agency ---
        # xyz_agency:
        #   ansible_host: 207.148.xxx.xxx
        #   client_name: "XYZ Agency"
        #   app_port: 80
        #   pbx_host: "207.148.xxx.xxx"

        # --- Your Test Server ---
        # test_server:
        #   ansible_host: 45.77.75.198
        #   client_name: "Internal Test"
        #   app_port: 80
        #   pbx_host: "45.77.75.198"
