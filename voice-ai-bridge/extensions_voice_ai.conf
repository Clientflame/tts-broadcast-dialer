; ============================================================================
; Voice AI Bridge - Asterisk Dialplan Configuration
; Auto-deployed by AI TTS Broadcast Dialer
; ============================================================================

[voice-ai-handler]
; Entry point for Voice AI calls
; Variables passed from dialer: VOICE_AI_PROMPT_ID, CONTACT_NAME, CONTACT_PHONE, CAMPAIGN_NAME
exten => s,1,NoOp(Voice AI Bridge - Prompt: ${VOICE_AI_PROMPT_ID})
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Set(STASIS_RESULT=${SHELL(curl -s -o /dev/null -w "%{http_code}" http://localhost:8088/ari/applications/voice-ai-bridge -u voice-ai:voice-ai-secret)})
 same => n,GotoIf($["${STASIS_RESULT}" = "200"]?stasis_ok:stasis_fail)
 same => n(stasis_ok),Stasis(voice-ai-bridge,${VOICE_AI_PROMPT_ID},${CONTACT_NAME},${CONTACT_PHONE},${CAMPAIGN_NAME})
 same => n,Hangup()
 same => n(stasis_fail),NoOp(Voice AI Bridge not available - HTTP ${STASIS_RESULT})
 same => n,Playback(silence/2)
 same => n,Playback(tt-weasels)
 same => n,Hangup()

; Handle any extension failures
exten => failed,1,NoOp(Voice AI call failed)
 same => n,Hangup()

exten => h,1,NoOp(Voice AI call hangup handler)
