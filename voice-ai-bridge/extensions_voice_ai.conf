; ============================================================================
; Voice AI Bridge - Asterisk Dialplan Configuration
; Auto-deployed by AI TTS Broadcast Dialer
; ============================================================================

[voice-ai-handler]
; Entry point for Voice AI calls
; Variables passed from dialer: VOICE_AI_PROMPT_ID, CONTACT_NAME, CONTACT_PHONE, CAMPAIGN_NAME
exten => s,1,NoOp(Voice AI Bridge - Prompt: ${VOICE_AI_PROMPT_ID})
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Stasis(voice-ai-bridge,${VOICE_AI_PROMPT_ID},${CONTACT_NAME},${CONTACT_PHONE},${CAMPAIGN_NAME})
 same => n,Hangup()

; Fallback if Stasis app is not running
exten => failed,1,NoOp(Voice AI Bridge not available - playing fallback)
 same => n,Playback(tt-weasels)
 same => n,Hangup()
